<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Row colors</title>
    <style>
        .repet-pattern{
            width: 150px;
            height: 30px;
            background-color: green;
            border-left: 40px solid orange;
        }
        .repet-pattern2{
            width: 150px;
            height: 30px;
            background-color: orange;
            border-left: 40px solid green;
        }

    </style>
</head>
<body>
    <h3>Row 1</h3>
<div style="background-color: red; height:30px; width: 400px;border-right: 300px solid blue; "></div>
</div>

<h3>Row 2</h3>
<div style="background-color: green; height:30px; width: 650px;border-right: 150px solid blue; "></div>
</div>

<h3>Row 3</h3>
<div style="background-color: green; height:30px; width: 600px;border-right: 50px solid blue;  border-left: 50px solid red;">
</div>

    <h3>Row 4</h3>
<div style="background-color: red; height:30px; width: 600px;border-right: 100px solid blue; ">
</div>

<h3>Row 5</h3>
<div>
    <div style="background-color: green; height:30px; width: 700px; display: flex; align-items: center; justify-content: center; ">
        <div style="background-color: red ; width: 20px;height:20px;"></div>
    </div>
 <h3>Row 6</h3>
<div>
    <div style="background-color: red; height:30px; width: 700px; display: flex; align-items: center; justify-content: center; ">
        <div style="background-color: blue ; width: 40px;height:30px;">

        </div>
    </div>

    <h3>Row 7</h3>
    <div style="display: flex;">
       <div style="height: 30px;width: 50px; background-color: red;">
       </div>
       <div style="height: 30px;width: 650px; background-color: blue; display: flex;">
        <div style="width: 650px; height: 10px; background-color: green; margin-top: 8px;"></div>
       </div>
       </div>

       <h3>Row 8</h3>
       <div style="display: flex;">
       <div class="repet-pattern"></div>
         <div class="repet-pattern"></div> 
           <div class="repet-pattern"></div> 
            <div class="repet-pattern" style="border-right: 60px solid orange;" ></div> 

          
          </div>

 <h3>Row 9</h3>
  
       <div style="display: flex;">
       <div class="repet-pattern2"></div>
         <div class="repet-pattern2"></div> 
           <div class="repet-pattern2"></div> 
            <div class="repet-pattern2" style="border-right: 60px solid orange;" ></div> 

          
          </div>

</body>
</html>
